vrrp_script check_app {
    script "/usr/local/bin/check_app.sh"
    interval 2
    weight -20
    fall 3
    rise 1
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 90
    advert_int 1
    
    authentication {
        auth_type PASS
        auth_pass hisagent2026
    }
    
    track_script {
        check_app
    }
    
    virtual_ipaddress {
        192.168.1.100/24 dev eth0 label eth0:vip
    }
}
