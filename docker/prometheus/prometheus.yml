global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'his-agent-monitor'

scrape_configs:
  # Spring Boot 应用
  - job_name: 'his-agent-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'his-agent-backend'
          environment: 'development'
    
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'
          environment: 'development'
