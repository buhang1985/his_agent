# Redis 配置文件

# 绑定地址 (允许所有)
bind 0.0.0.0

# 端口
port 6379

# 保护模式
protected-mode no

# 密码 (生产环境请设置)
# requirepass your_password

# 持久化
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# 最大内存
maxmemory 256mb

# 内存淘汰策略
maxmemory-policy allkeys-lru

# 日志
loglevel notice

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128

# 连接数
maxclients 10000

# TCP 保持连接
tcp-keepalive 300
