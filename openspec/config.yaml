schema: spec-driven

# 项目上下文
# 在创建工件时向 AI 显示此信息。
context: |
  ## 项目定位
  his_agent 是一个嵌入现有医院信息系统 (HIS) 的医疗 AI 助手，通过 Web 页面嵌入方式 (iframe) 集成到 HIS 系统中。

  ## 技术栈
  - **运行时**: Node.js 20+
  - **语言**: TypeScript 5+ (严格模式)
  - **前端框架**: React 18+ with Hooks
  - **构建工具**: Vite
  - **UI 组件**: 待定 (推荐 shadcn/ui 或 Ant Design)
  - **状态管理**: 待定 (Zustand/Jotai/Context)
  - **LLM 集成**: 支持云端 API (Claude/GPT/国产模型) 和本地部署 (Ollama/vLLM) 双模式

  ## 核心功能
  1. **智能问诊** - 通过麦克风录入医患对话，实时转写生成结构化病历
  2. **诊断建议** - 基于症状和病史提供鉴别诊断参考
  3. **病历生成** - 自动生成符合医疗规范的结构化电子病历
  4. **医学知识查询** - 快速检索药品信息、疾病指南、相互作用检查

  ## 技术约束
  - **语音录入**: 需要支持中文医学术语的语音识别 (Web Speech API / Whisper / 云服务)
  - **HIS 集成**: 通过 postMessage 与宿主 HIS 系统安全通信
  - **部署灵活**: 支持云端 LLM 和本地私有化部署两种模式
  - **数据安全**: 患者数据不出院内，符合医疗数据合规要求

  ## 开发约定
  - 使用约定式提交 (Conventional Commits)
  - 所有功能模块必须有类型定义
  - 医疗相关功能需要安全审查和测试覆盖

# 每个工件的规则
rules:
  proposal:
    - 保持提案在 800 字以内
    - 始终包含"非目标 (Non-Goals)"部分
    - 明确技术选型理由和替代方案
  design:
    - 必须包含架构图 (ASCII 或 Mermaid)
    - 明确定义模块边界和接口
    - 说明数据安全处理方案
  tasks:
    - 将任务分解为最多 4 小时的块
    - 每个任务必须有明确的验收标准
    - 标注任务依赖关系
