schema: spec-driven

# 项目上下文
context: |
  ## 项目定位
  his_agent 是一个嵌入现有医院信息系统 (HIS) 的医疗 AI 助手，通过 Web 页面嵌入方式 (iframe) 集成到 HIS 系统中。

  ## 技术栈
  - **后端**: Java 17+ / Spring Boot 3.x / Maven 3.9+
  - **前端**: Vue 3.4+ / TypeScript 5+ / Vite 6+
  - **API 风格**: RESTful API + WebSocket (实时语音流)
  - **LLM 集成**: Spring AI 框架，支持云端 API (Qwen/Claude) 和本地部署 (Ollama/vLLM) 双模式
  - **语音识别**: 
    - **主方案 (云端)**: 讯飞医疗智能语音输入系统 (iFlytek Medical ASR) - 97% 中文医学识别准确率，400ms 延迟，52 科室词库
    - **备选 (云端)**: 阿里云智能语音 (Alibaba Cloud Intelligent Speech) - 自学习医学词库，27 方言支持
    - **本地部署**: Whisper.cpp - 数据不出院，私有化部署
  - **数据库**: MySQL 8+ (业务数据) / Milvus (向量检索，可选)
  - **缓存**: Redis 7+ (可选，用于会话和 API 缓存)

  ## 核心功能
  1. **智能问诊** - 通过麦克风录入医患对话，实时转写生成结构化病历
  2. **诊断建议** - 基于症状和病史提供鉴别诊断参考
  3. **病历生成** - 自动生成符合医疗规范的 SOAP 格式电子病历
  4. **医学知识查询** - 快速检索药品信息、疾病指南、相互作用检查

  ## 语音识别技术选型 (2026-03-11 更新)
  
  ### 主方案：讯飞医疗智能语音输入系统 (iFlytek Medical ASR)
  **选型理由**:
  - 医疗专业化：唯一 dedicated 医疗 ASR 供应商 (讯飞医疗科技股份有限公司，HKEX: 02506)
  - 中文卓越：97% 普通话准确率，支持 27 种方言 (对区域医院关键)
  - 医院验证：中国医科大学医院、浙江大学医学院等三甲医院部署
  - 数据合规：国内数据中心，MLPS 认证，支持私有云部署
  - 医学词库：内置 100 万 + 医学词汇，覆盖 52 个科室
  - 成本效益：约 ¥0.01-0.03/次 vs 国际供应商 $0.15+/分钟
  - 低延迟：400ms 响应时间 vs 国际 API 1200ms+
  
  **API 访问与付费**:
  - 注册平台：https://console.xfyun.cn/ (5 分钟完成)
  - 认证要求：企业认证需营业执照 + 法人身份证 (≤3 工作日)
  - 免费额度：10 万次/3 个月 (5 并发)
  - 按量计费：约 ¥1.26-1.40/千次，1000 万次以上 ¥1.26/千次
  - 资源包：500 万次 $6,650 / 1000 万次 $12,600 (1 年有效期)
  - 支付方式：支付宝、微信、银行转账、增值税专用发票 (企业)
  - 技术支持：400-606-9900 | openplatform@iflytek.com
  - 医疗专线：shbu_bm_ml@iflytek.com | (0551) 6530 9980
  
  **推荐产品**: 医疗智能语音输入系统
  - 实时流式识别支持
  - 科室自定义词库
  - 私有云部署选项
  
  ### 备选方案：阿里云智能语音 (Alibaba Cloud Intelligent Speech)
  **适用场景**:
  - 需要阿里云生态集成
  - 需要自服务自定义模型训练
  - 想要灵活定价和免费额度
  
  **API 访问与付费**:
  - 注册平台：https://ai.aliyun.com/nls
  - 免费试用：3 个月全功能试用
  - 按量计费：¥1.20-3.50/小时 (阶梯优惠)
  - 资源包：30 小时 ¥100 元起
  - 支付方式：支付宝、微信、对公转账、增值税专用发票
  - 技术支持：95187 | 工单系统
  
  **优势**:
  - 优秀的中文方言支持
  - 自学习平台医学术语
  - 强合规认证 (MLPS, ISO27001)
  - 有竞争力定价
  
  ### 本地部署：Whisper.cpp (备用)
  **适用场景**:
  - 数据完全不出院要求
  - 网络条件受限
  - 成本敏感场景
  
  **限制**:
  - 延迟 1-2s (相比云端 400ms)
  - 需要本地 GPU/CPU 资源
  - 医学词库需要手动增强
  
  ### 项目初期推荐策略 (性价比优先)
  
  **测试阶段 (0-3 个月)**:
  - 主用：腾讯云 ASR (每月 5 小时免费 + 5000 次短语音)
  - 理由：免费额度最多，长期有效，适合原型验证
  - 预计成本：¥0-200/月
  
  **正式部署 (3 个月后)**:
  - 主用：讯飞医疗 SDK (专业医学词库)
  - 备用：阿里云 ASR (灾备)
  - 预计成本：¥2000-5000/月 (按门诊量)
  
  **成本估算示例** (5 诊室，日均 150 患者，每患者 2 分钟):
  - 月语音时长：110 小时
  - 腾讯云：(110-5) × ¥1.5/小时 ≈ ¥158/月
  - 讯飞医疗：110 × ¥3/小时 ≈ ¥330/月
  - 阿里云：1000 小时资源包 ¥1800/年 ≈ ¥150/月 (均摊)

  ## 技术约束
  - **语音录入**: 
    - **云端优先 (项目初期)**: 讯飞医疗 ASR API 实时流式识别，支持中文医学术语优化
    - **本地备用**: Whisper.cpp 私有化部署，数据不出院
    - **降级策略**: 讯飞失败 → 阿里云 ASR → Whisper 本地识别
  - **医学词库**: 
    - 讯飞内置 100 万 + 医学词汇 (52 科室覆盖)
    - 支持医院自定义科室词库 (如：儿科、心内科专科术语)
    - 词库更新频率：每周同步最新医学术语
  - **HIS 集成**: 前端通过 postMessage 与宿主 HIS 系统安全通信
  - **部署灵活**: 支持云端 LLM 和本地私有化部署两种模式
  - **数据安全**: 
    - 患者数据不出院内 (本地 Whisper 模式)
    - 云端 ASR 使用国内数据中心 (讯飞/阿里云 MLPS 合规)
    - 录音数据不持久化，生成病历后自动删除
  - **性能指标**:
    - 实时转写延迟 < 500ms (讯飞 400ms)
    - 医学术语识别准确率 ≥ 85% (讯飞 97%)
    - 病历生成时间 < 10 秒 (云端 LLM)
  
  ## 云端服务 API 接入指南 (项目初期)
  
  ### 讯飞医疗 ASR 接入步骤
  
  **Step 1: 注册账号 (5 分钟)**
  ```
  1. 访问 https://console.xfyun.cn/
  2. 微信扫码或手机号注册
  3. 登录控制台
  ```
  
  **Step 2: 创建应用 (即时)**
  ```
  1. 控制台 → 我的应用 → 创建应用
  2. 填写应用名称、行业 (选择"医疗健康")
  3. 获取 APPID、API Key、Secret Key
  4. 保存凭证 (后续配置使用)
  ```
  
  **Step 3: 实名认证 (≤3 工作日)**
  ```
  企业认证材料:
  - 营业执照扫描件
  - 法人身份证
  - 管理员手机号
  
  个人认证 (仅测试用):
  - 身份证正反面
  ```
  
  **Step 4: 开通服务 (即时)**
  ```
  1. 控制台 → 语音听写 → 开通服务
  2. 选择计费方式 (推荐：先使用免费额度)
  3. 免费额度：10 万次/3 个月
  ```
  
  **Step 5: 配置环境变量**
  ```bash
  # .env 文件
  XUNFEI_APP_ID=your_app_id
  XUNFEI_API_KEY=your_api_key
  XUNFEI_API_SECRET=your_api_secret
  ```
  
  **Step 6: 集成 SDK**
  ```java
  // 后端 Spring Boot (Java SDK)
  // Maven 依赖
  <dependency>
      <groupId>com.iflytek</groupId>
      <artifactId>msc</artifactId>
      <version>1.0.0</version>
  </dependency>
  ```
  
  ### 腾讯云 ASR 接入步骤 (测试期推荐)
  
  **Step 1-3: 同上 (注册、创建应用、认证)**
  ```
  1. 访问 https://console.cloud.tencent.com/asr
  2. 实名认证 (必做，否则无法使用免费额度)
  3. 开通语音识别服务
  ```
  
  **Step 4: 获取免费额度 (自动)**
  ```
  - 开通即享每月 5 小时实时 + 5000 次短语音
  - 无需额外申请
  - 次月自动重置
  ```
  
  **Step 5: 配置环境变量**
  ```bash
  # .env 文件
  TENCENT_SECRET_ID=your_secret_id
  TENCENT_SECRET_KEY=your_secret_key
  TENCENT_APP_ID=your_app_id
  ```
  
  ### 阿里云智能语音接入步骤
  
  **Step 1-3: 同上**
  ```
  1. 访问 https://ai.aliyun.com/nls
  2. 阿里云账号登录
  3. 开通智能语音交互服务
  ```
  
  **Step 4: 免费试用**
  ```
  - 新用户 3 个月全功能试用
  - 需在控制台领取
  ```
  
  ### 支付方式配置
  
  **个人/测试账户**:
  - 支付宝扫码充值 (推荐，即时到账)
  - 微信支付 (推荐，即时到账)
  - 建议预充值 ¥100-500 元用于测试
  
  **企业账户**:
  - 银行对公转账
  - 申请增值税专用发票
  - 联系销售经理获取合同和发票信息
  
  ### 成本控制建议
  
  **测试期 (0-3 个月)**:
  - 优先使用免费额度 (腾讯云 5 小时/月 + 讯飞 10 万次)
  - 设置消费预警 (如：¥100/月)
  - 每日查看用量报表
  - 避免高频调用 (开发时 mock 数据)
  
  **生产期 (3 个月后)**:
  - 采购资源包 (比按量计费便宜 30-40%)
  - 与供应商洽谈大客户折扣
  - 考虑混合部署 (云端 + 本地)
  - 定期优化调用逻辑 (减少无效请求)

  ## 开发约定
  - 使用约定式提交 (Conventional Commits)
  - **后端**: Spring Boot 最佳实践，Lombok 简化代码，JUnit 5 单元测试
  - **前端**: Vue 3 Composition API，TypeScript 严格模式，Vitest 单元测试
  - **测试要求**: 每个功能模块必须有单元测试，核心业务逻辑测试覆盖率 ≥ 80%
  - **任务执行**: 串行执行，每个任务必须测试通过后才能执行下一个任务
  - **文档要求**: 
    - 所有接口必须有 Swagger/OpenAPI 文档
    - 所有方法必须有 JSDoc/TSDoc 说明
    - 每个功能必须有用例文档
    - 测试完毕必须生成测试结果文档
    - 所有文档存放在 docs 文件夹
  - **数据库约束**:
    - 所有 DDL/DML 脚本必须保存在 docs/database/ 目录
    - 使用 Flyway 进行数据库版本管理 (V<版本>__描述.sql 命名)
    - 每个表必须有 COMMENT 注释说明用途
    - 每个字段必须有 COMMENT 注释说明含义
    - 必须使用外键约束保证数据完整性
    - 必须为常用查询字段创建索引
    - 使用 UTF8MB4 字符集支持中文
    - 所有脚本必须包含回滚语句
    - 数据库变更必须先评审后执行
  - **Git 工作流**:
    - 使用 Git Flow 分支模型
    - main 分支为生产分支，受保护，只能从 develop 合并
    - develop 分支为开发分支，所有功能开发在此分支进行
    - feature/* 为功能分支，从 develop 创建，完成后合并回 develop
    - 每次开发都在 feature 分支进行，禁止直接在 develop 分支开发
    - develop 分支测试验证通过后，询问是否合并到 main 分支
    - 遵循 Conventional Commits 提交规范
    - 所有提交必须关联到具体任务或功能
  - **定时任务约束**:
    - **失败重试机制**:
      - 使用 Spring @Retryable 或自定义重试逻辑
      - 默认重试次数：3 次
      - 重试间隔：指数退避（1s, 2s, 4s）
      - 最大重试间隔：30 秒
      - 仅对可恢复异常重试（网络超时、临时锁等）
      - 业务逻辑错误不重试（数据验证失败、权限不足等）
      - 重试失败后发送告警通知
    - **超时控制**:
      - 所有定时任务必须设置执行超时
      - 默认超时时间：5 分钟
      - 长任务（数据同步、报表生成）：≤ 30 分钟
      - 短任务（健康检查、缓存刷新）：≤ 1 分钟
      - 超时任务必须记录告警日志
      - 超时任务不自动重试，需人工介入
    - **监控日志**:
      - 使用 @Scheduled 任务必须记录执行日志
      - 日志必须包含：任务名称、开始时间、结束时间、执行时长、状态（成功/失败）、异常信息
      - 使用 SLF4J 记录结构化日志
      - 关键任务记录执行前后的数据快照（不含敏感数据）
      - 任务执行日志单独记录到 scheduled-tasks.log
      - 失败任务必须记录完整堆栈跟踪
      - 任务执行时长超过阈值（默认 80% 超时时间）记录警告
    - **全局并发约束**:
      - 使用分布式锁（Redis Lock）防止多实例重复执行
      - 锁键命名：his_agent:scheduler:{task_name}
      - 锁超时时间 = 任务超时时间 + 5 分钟
      - 同一时间仅允许一个任务实例运行
      - 任务堆积检测：检测到堆积时发送告警
      - 最大并发任务数：≤ 5 个（可配置）
      - 高优先级任务可抢占低优先级任务（需白名单）
    - **任务定义规范**:
      - 所有定时任务必须在配置类中集中定义
      - 使用 @EnableScheduling 启用调度
      - Cron 表达式必须配置在 application.yml 中，禁止硬编码
      - Cron 表达式必须包含注释说明执行频率
      - 生产环境默认关闭所有非关键定时任务
      - 使用 @Async 执行长任务，避免阻塞调度线程
    - **任务类型与频率约束**:
      - 健康检查：每 30 秒 - 1 分钟
      - 缓存刷新：每 5-30 分钟
      - 数据同步：每 15 分钟 - 1 小时
      - 报表生成：每天 1-2 次（非业务高峰）
      - 数据清理：每周 1 次（业务低峰期）
      - 数据备份：每天 1 次（凌晨 2-4 点）
      - 会话清理：每 10-15 分钟
      - 日志归档：每天 1 次（凌晨 3-5 点）
  - **缓存约束**:
    - 使用 Redis 作为统一缓存存储
    - 缓存键命名规范：his_agent:{模块}:{数据类型}:{ID}
    - 缓存过期时间必须明确设置，禁止永久缓存
    - 患者数据缓存时间 ≤ 30 分钟
    - 医学词库缓存时间 ≤ 24 小时
    - 会话数据缓存时间 ≤ 2 小时
    - 缓存穿透防护：使用布隆过滤器或空值缓存
    - 缓存雪崩防护：过期时间添加随机偏移
    - 缓存更新策略：先更新数据库，再删除缓存
  - **代码风格约束**:
    - 后端遵循 Google Java Style Guide
    - 前端使用 ESLint + Prettier 格式化
    - 后端类名使用大驼峰 (ConsultationService)
    - 后端方法名使用小驼峰 (createConsultation)
    - 前端组件名使用大驼峰 (VoiceInput.vue)
    - 前端变量名使用小驼峰 (consultationData)
    - 常量名使用大写 + 下划线 (MAX_RETRY_COUNT)
    - 单行代码长度 ≤ 120 字符
    - 方法长度 ≤ 50 行
    - 类长度 ≤ 500 行
    - 禁止使用魔法数字，必须定义常量
    - 禁止空 catch 块，必须处理或记录异常
    - 禁止 suppress 警告，必须修复警告
  - **错误异常规范**:
    - 使用统一异常处理机制 (GlobalExceptionHandler)
    - 业务异常使用 BusinessException
    - 权限异常使用 AccessDeniedException
    - 资源不存在使用 NotFoundException
    - 参数验证异常使用 MethodArgumentNotValidException
    - 异常信息必须友好且不含技术细节
    - 异常必须记录完整堆栈日志
    - 异常日志必须包含：时间、用户、请求、异常类型、堆栈
    - 前端使用统一错误提示组件
    - 网络错误显示友好提示，不显示原始错误信息
  - **网关安全**:
    - 使用 Spring Security Gateway 进行 API 保护
    - 所有 API 默认需要认证，白名单接口除外
    - 使用 JWT Token 进行身份验证
    - Token 有效期 ≤ 2 小时
    - Refresh Token 有效期 ≤ 7 天
    - 实现 IP 白名单机制 (仅允许 HIS 系统 IP)
    - 实现请求频率限制 (每 IP 每秒 ≤ 10 请求)
    - 实现防重放攻击机制 (nonce + timestamp)
    - 敏感操作需要二次验证
    - 所有请求记录审计日志
  - **外部 HIS 系统接口安全**:
    - 外部 HIS 系统调用需要身份口令认证
    - 使用 API Key + Secret 机制
    - API Key 通过环境变量配置，禁止硬编码
    - 每个 HIS 系统分配独立 API Key
    - 请求签名：HMAC-SHA256(timestamp + body + secret)
    - 签名放在请求头：X-HIS-Signature
    - 时间戳验证：请求时间与服务器时间差 ≤ 5 分钟
    - 实现 IP 白名单，仅允许注册的 HIS 系统 IP
    - API Key 定期轮换 (建议 90 天)
    - API Key 泄露时立即吊销并重新生成

# 每个工件的规则
rules:
  proposal:
    - 保持提案在 800 字以内
    - 始终包含"非目标 (Non-Goals)"部分
    - 明确技术选型理由和替代方案
    - 如涉及数据库变更，必须说明 schema 影响
    - 如涉及缓存，必须说明缓存策略和过期时间
    - 如涉及安全，必须说明认证和授权方案
  design:
    - 必须包含架构图 (ASCII 或 Mermaid)
    - 明确定义模块边界和接口
    - 说明数据安全处理方案
    - 如涉及数据库，必须包含 ER 图和表结构设计
    - 如涉及缓存，必须包含缓存结构图
    - 如涉及外部接口，必须包含认证流程图
  tasks:
    - 将任务分解为最多 4 小时的块
    - 每个任务必须有明确的验收标准
    - 标注任务依赖关系
    - 必须包含单元测试要求
    - 必须等待上个任务测试通过后才能执行下一个
    - 必须生成接口文档和用例文档
    - 测试完毕必须生成测试结果文档
    - 如涉及数据库变更，必须编写 DDL/DML 脚本
    - 如涉及数据库变更，必须创建 Flyway 迁移脚本
    - 如涉及数据库变更，必须更新数据库文档
    - 如涉及数据库变更，必须经过 DBA 评审
    - 如涉及缓存，必须编写缓存测试用例
    - 如涉及安全，必须编写安全测试用例
    - 代码必须符合代码风格规范
    - 异常处理必须符合异常规范
