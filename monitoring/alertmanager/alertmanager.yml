# AlertManager 配置文件
# 位置：monitoring/alertmanager/alertmanager.yml

global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@his-agent.local'

# 模板文件
templates:
  - 'templates/*.tmpl'

# 路由配置
route:
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  
  # 子路由
  routes:
    # P0 告警 - 立即通知
    - match:
        severity: p0
      receiver: 'p0-critical'
      repeat_interval: 5m
      continue: true
    
    # P1 告警 - 30 分钟内响应
    - match:
        severity: p1
      receiver: 'p1-warning'
      repeat_interval: 30m
    
    # P2 告警 - 24 小时内响应
    - match:
        severity: p2
      receiver: 'p2-info'
      repeat_interval: 4h
    
    # 后端团队告警
    - match:
        team: backend
      receiver: 'backend-team'
    
    # 运维团队告警
    - match:
        team: ops
      receiver: 'ops-team'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # P0 紧急告警
  - name: 'p0-critical'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/p0'
        send_resolved: true
    # 邮件通知
    email_configs:
      - to: 'ops-team@his-agent.local'
        send_resolved: true

  # P1 警告告警
  - name: 'p1-warning'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/p1'
        send_resolved: true
    email_configs:
      - to: 'dev-team@his-agent.local'
        send_resolved: true

  # P2 信息告警
  - name: 'p2-info'
    email_configs:
      - to: 'dev-team@his-agent.local'
        send_resolved: true

  # 后端团队
  - name: 'backend-team'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/backend'
        send_resolved: true

  # 运维团队
  - name: 'ops-team'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/ops'
        send_resolved: true

# 抑制规则
inhibit_rules:
  # 当服务宕机时，抑制其他告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.+'
    equal: ['instance']
