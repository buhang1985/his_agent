# Prometheus 配置文件
# 位置：monitoring/prometheus/prometheus.yml

global:
  scrape_interval: 15s          # 默认抓取间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: 'his-agent-monitor'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# 规则文件
rule_files:
  - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # HIS Agent 应用监控
  - job_name: 'his-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          application: 'his-agent'
          environment: 'dev'
    metric_relabel_configs:
      # 只保留我们关心的指标
      - source_labels: [__name__]
        regex: 'jvm_.*|http_server_.*|hikaricp_.*|process_.*|resilience4j_.*|his_.*'
        action: keep

  # 系统监控（Node Exporter）
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'his-agent-server'

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
        labels:
          instance: 'redis-local'

  # MySQL 监控
  - job_name: 'mysql'
    static_configs:
      - targets: ['localhost:3306']
        labels:
          instance: 'mysql-local'
