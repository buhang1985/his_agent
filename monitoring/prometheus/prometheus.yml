# Prometheus 配置文件
# 位置：monitoring/prometheus/prometheus.yml

global:
  scrape_interval: 15s          # 默认抓取间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: 'his-agent-monitor'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# 规则文件
rule_files:
  - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # HIS Agent 应用监控
  - job_name: 'his-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          application: 'his-agent'
          environment: 'dev'

  # Node Exporter（系统监控）
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'his-agent-server'

  # MySQL Exporter
  - job_name: 'mysql'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9104']
        labels:
          service: 'mysql'
          instance: 'mysql-local'
  
  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
        labels:
          service: 'redis'
          instance: 'redis-local'
