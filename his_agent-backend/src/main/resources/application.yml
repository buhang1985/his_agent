spring:
  application:
    name: his-agent-backend
  
  # MySQL 数据源配置
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HisAgentHikariPool
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop  # Demo 使用，自动创建表
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  
  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true  # 严格验证迁移脚本
    clean-disabled: true  # 生产环境禁用 clean
    encoding: UTF-8
    placeholder-prefix: "${"
    placeholder-suffix: "}"

# MySQL 慢查询日志配置（需要在 MySQL 配置文件中设置）
# my.cnf:
#   slow_query_log = 1
#   slow_query_log_file = /var/log/mysql/slow.log
#   long_query_time = 2  # 超过 2 秒的查询记录为慢查询
#   log_queries_not_using_indexes = 1
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Spring AI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:demo-key}
      base-url: ${OPENAI_BASE_URL:http://localhost:11434/v1}
      chat:
        enabled: true
        options:
          model: ${LLM_MODEL:qwen2.5:7b}
          temperature: 0.7
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.7

# 服务器配置
server:
  port: ${SERVER_PORT:8080}

# 日志配置
logging:
  level:
    root: INFO
    com.hisagent: DEBUG
    org.springframework.ai: DEBUG

# Resilience4j 配置
resilience4j:
  circuitbreaker:
    instances:
      voiceRecognition:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      llmService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60000
        permittedNumberOfCallsInHalfOpenState: 3
      hisIntegration:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
  ratelimiter:
    instances:
      default:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      userLevel:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.dao.TransientDataAccessException
  timelimiter:
    instances:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true

# 外部服务超时配置
app:
  voice-service:
    connect-timeout: 5000
    read-timeout: 30000
  llm-service:
    connect-timeout: 10000
    read-timeout: 60000
  his-service:
    connect-timeout: 5000
    read-timeout: 15000

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,threaddump,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        step: 60s

# API 文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

