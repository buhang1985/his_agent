spring:
  application:
    name: his-agent-backend
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:his_agent}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Flyway 迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Spring AI 配置
spring.ai:
  # 通义千问配置 (OpenAI 兼容接口)
  openai:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    chat:
      options:
        model: qwen-plus
        temperature: 0.7
  
  # Anthropic Claude 配置
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    chat:
      options:
        model: claude-sonnet-4-20250514
        temperature: 0.7

# 服务器配置
server:
  port: ${SERVER_PORT:8080}

# 日志配置
logging:
  level:
    root: INFO
    com.hisagent: DEBUG
    org.springframework.ai: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# API 文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
