spring:
  application:
    name: his-agent-backend
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HisAgentHikariPool
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
    encoding: UTF-8
    placeholder-prefix: "${"
    placeholder-suffix: "}"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: simple

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-sp-758abbba5db646c79da0572e8e694b5e}
      base-url: ${OPENAI_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
      chat:
        enabled: true
        options:
          model: ${LLM_MODEL:qwen3.5-plus}
          temperature: 0.7
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.7

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.hisagent: DEBUG
    org.springframework.ai: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      voiceRecognition:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      llmService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60000
        permittedNumberOfCallsInHalfOpenState: 3
      hisIntegration:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
  ratelimiter:
    instances:
      default:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      userLevel:
        limitForPeriod: 20
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.dao.TransientDataAccessException
  timelimiter:
    instances:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true

app:
  voice-service:
    connect-timeout: 5000
    read-timeout: 30000
  llm-service:
    connect-timeout: 10000
    read-timeout: 60000
  his-service:
    connect-timeout: 5000
    read-timeout: 15000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,threaddump,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: false
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        step: 60s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

iflytek:
  app-id: 8bc8b3ca
  api-key: ef71686251f3f7b42bbb56c3d737f938
  domain: medical
  websocket-url: wss://rtasr.xfyun.cn/v1/ws
